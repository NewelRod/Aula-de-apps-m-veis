<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Media escolar</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" ></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">

    <main>

    <label for="n1">Nota 1:</label>
