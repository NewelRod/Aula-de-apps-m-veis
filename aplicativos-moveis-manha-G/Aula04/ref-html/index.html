      <input type="number" placeholder="Número 02" id="num2" />

        <option value="-">Subtração (-)</option>
        <option value="*">Multiplicação (x)</option>
        <option value="/">Divisão (/)</option>
      </select>
    </div>
    <div>

    </div>

                case '+':
